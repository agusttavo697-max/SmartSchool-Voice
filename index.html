<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  onValue
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "smartschool-voice.firebaseapp.com",
  databaseURL: "https://smartschool-voice-default-rtdb.firebaseio.com",
  projectId: "smartschool-voice",
  storageBucket: "smartschool-voice.firebasestorage.app",
  messagingSenderId: "887720139006",
  appId: "1:887720139006:web:ba6e287345a32bbd8c6daf",
  measurementId: "G-Z17KJ30NLF"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.enviarSugestao = function () {

  const sugestao = document.getElementById("sugestao").value;

  if (sugestao.trim() === "") {
    alert("Digite uma sugestão");
    return;
  }

  push(ref(db, "sugestoes"), {
    texto: sugestao,
    data: new Date().toLocaleString()
  });

  alert("Sugestão enviada!");

  document.getElementById("sugestao").value = "";
};

window.enviarQuestionario = function () {

  const limpeza = Number(document.getElementById('qLimpeza').value);

  const seguranca = Number(document.getElementById('qSeguranca').value);

  const merenda = Number(document.getElementById('qMerenda').value);

  const conforto = Number(document.getElementById('qConforto').value);

  push(ref(db, "questionarios"), {
    limpeza,
    seguranca,
    merenda,
    conforto,
    data: new Date().toLocaleString()
  });

  alert("Questionário enviado!");
};

const respostasRef = ref(db, "questionarios");

onValue(respostasRef, (snapshot) => {

  const dados = snapshot.val();

  if (!dados) return;

  const valores = Object.values(dados);

  let somaLimpeza = 0;
  let somaSeguranca = 0;
  let somaMerenda = 0;
  let somaConforto = 0;

  valores.forEach(item => {
    somaLimpeza += item.limpeza;
    somaSeguranca += item.seguranca;
    somaMerenda += item.merenda;
    somaConforto += item.conforto;
  });

  const total = valores.length;

  const mediaLimpeza = Math.round(somaLimpeza / total);
  const mediaSeguranca = Math.round(somaSeguranca / total);
  const mediaMerenda = Math.round(somaMerenda / total);
  const mediaConforto = Math.round(somaConforto / total);

  atualizarBarra('limpeza', 'txtLimpeza', mediaLimpeza);

  atualizarBarra('seguranca', 'txtSeguranca', mediaSeguranca);

  atualizarBarra('merenda', 'txtMerenda', mediaMerenda);

  atualizarBarra('conforto', 'txtConforto', mediaConforto);

  const mediaGeral = Math.round(
    (
      mediaLimpeza +
      mediaSeguranca +
      mediaMerenda +
      mediaConforto
    ) / 4
  );

  document.getElementById('indice').innerText =
    mediaGeral + '%';

  document.getElementById('participacoes').innerText =
    total;
});
</script>
